<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tracker</title>

    <!-- ===== CSS ===== -->
    <style>
        /* ----- RESET & GLOBAL ----- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ----- SCROLLBAR ----- */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ----- APP LAYOUT ----- */
        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 8px;
            padding: 8px 8px 0 8px;
        }

        /* ----- SIDEBAR ----- */
        .sidebar {
            width: 240px;
            min-width: 200px;
            background: #121212;
            border-radius: 12px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo .icon {
            color: #1DB954;
        }
        .logo span {
            color: #fff;
        }

        .sidebar-btn {
            background: #1DB954;
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sidebar-btn:hover {
            transform: scale(1.02);
            background: #1ed760;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-menu-item {
            padding: 10px 14px;
            border-radius: 8px;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-menu-item:hover {
            color: #fff;
            background: #282828;
        }
        .sidebar-menu-item.active {
            color: #fff;
            background: #282828;
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid #282828;
            margin: 4px 0;
        }

        /* ----- MAIN CONTENT ----- */
        .main {
            flex: 1;
            background: #121212;
            border-radius: 12px;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Search Bar */
        .search-bar {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border-radius: 24px;
            border: none;
            background: #282828;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .search-bar input::placeholder {
            color: #7a7a7a;
        }
        .search-bar input:focus {
            outline: none;
            background: #333;
            box-shadow: 0 0 0 2px #1DB954;
        }
        .search-bar .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a7a7a;
            font-size: 18px;
        }

        /* Grid Music */
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grid-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .grid-header .count {
            color: #7a7a7a;
            font-size: 14px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 4px 0 20px 0;
        }

        /* ----- MUSIC CARD ----- */
        .music-card {
            background: #181818;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .music-card:hover {
            background: #282828;
            transform: translateY(-4px);
        }

        .music-card .card-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            object-fit: cover;
            background: #333;
            margin-bottom: 12px;
        }

        .music-card .card-title {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            margin-bottom: 4px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .music-card .card-artist {
            font-size: 13px;
            color: #b3b3b3;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Tombol hapus (muncul saat hover) */
        .music-card .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-card:hover .delete-btn {
            opacity: 1;
        }
        .music-card .delete-btn:hover {
            background: #e91429;
            transform: scale(1.1);
        }

        /* ----- SKELETON LOADING ----- */
        .skeleton-card {
            background: #181818;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .skeleton-card .skeleton-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            background: #282828;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .skeleton-card .skeleton-title {
            width: 80%;
            height: 16px;
            background: #282828;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .skeleton-card .skeleton-artist {
            width: 60%;
            height: 14px;
            background: #282828;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        @keyframes skeleton-pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* ----- BOTTOM PLAYER ----- */
        .player {
            background: #181818;
            border-top: 1px solid #282828;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
            height: 72px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 180px;
        }
        .player-info .player-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: #333;
            flex-shrink: 0;
        }
        .player-info .player-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .player-info .player-meta .p-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-info .player-meta .p-artist {
            font-size: 12px;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 600px;
            gap: 4px;
        }
        .player-controls .ctrl-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .player-controls .ctrl-buttons button {
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-controls .ctrl-buttons button:hover {
            color: #fff;
        }
        .player-controls .ctrl-buttons .play-btn {
            font-size: 32px;
            color: #fff;
        }
        .player-controls .ctrl-buttons .play-btn:hover {
            transform: scale(1.05);
            color: #1DB954;
        }

        .player-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .player-progress .time {
            font-size: 11px;
            color: #b3b3b3;
            min-width: 40px;
        }
        .player-progress .progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .player-progress .progress-bar .progress-fill {
            height: 100%;
            background: #1DB954;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .player-progress .progress-bar .progress-fill:hover {
            background: #1ed760;
        }

        .player-volume {
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }
        .player-volume input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        .player-volume input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        /* ----- MODAL ----- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #282828;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: modalSlide 0.25s ease;
        }
        @keyframes modalSlide {
            from {
                transform: translateY(20px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .modal .sub {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #b3b3b3;
            margin-bottom: 6px;
        }
        .modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #121212;
            color: #fff;
            font-size: 14px;
            transition: border 0.2s ease;
        }
        .modal .form-group input:focus {
            outline: none;
            border-color: #1DB954;
        }
        .modal .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal .modal-actions button {
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modal .modal-actions .btn-cancel {
            background: #333;
            color: #fff;
        }
        .modal .modal-actions .btn-cancel:hover {
            background: #444;
        }
        .modal .modal-actions .btn-submit {
            background: #1DB954;
            color: #000;
        }
        .modal .modal-actions .btn-submit:hover {
            background: #1ed760;
        }
        .modal .modal-actions .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .music-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .main {
                padding: 16px;
            }
            .player {
                padding: 8px 12px;
                flex-wrap: wrap;
                height: auto;
                gap: 8px;
            }
            .player-info {
                min-width: 120px;
            }
            .player-volume {
                display: none;
            }
        }

        /* YouTube iframe disembunyikan */
        #youtube-player {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== APP ===== -->
    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">🎵</span>
                <span>Music Tracker</span>
            </div>

            <button class="sidebar-btn" id="openAddModal">➕ Add Song</button>

            <hr class="sidebar-divider" />

            <div class="sidebar-menu">
                <div class="sidebar-menu-item active">🏠 Home</div>
                <div class="sidebar-menu-item">❤️ Favorites</div>
                <div class="sidebar-menu-item">📋 Playlists</div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari lagu..." />
            </div>

            <div class="grid-header">
                <h2>Library</h2>
                <span class="count" id="trackCount">0 lagu</span>
            </div>

            <div class="music-grid" id="musicGrid">
                <!-- Skeleton loading akan dirender oleh JS -->
            </div>
        </main>
    </div>

    <!-- ===== BOTTOM PLAYER ===== -->
    <footer class="player" id="player">
        <div class="player-info">
            <img class="player-cover" id="playerCover" src="" alt="cover" />
            <div class="player-meta">
                <span class="p-title" id="playerTitle">Pilih lagu</span>
                <span class="p-artist" id="playerArtist">-</span>
            </div>
        </div>

        <div class="player-controls">
            <div class="ctrl-buttons">
                <button id="prevBtn" title="Mundur 5s">⏮</button>
                <button class="play-btn" id="playBtn" title="Play / Pause">▶</button>
                <button id="nextBtn" title="Maju 5s">⏭</button>
            </div>
            <div class="player-progress">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>

        <div class="player-volume">
            <span>🔊</span>
            <input type="range" min="0" max="1" step="0.01" value="0.8" id="volumeControl" />
        </div>
    </footer>

    <!-- ===== YOUTUBE IFRAME (tersembunyi) ===== -->
    <div id="youtube-player"></div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>🎵 Tambah Lagu</h2>
            <p class="sub">Tempel link YouTube, sisanya akan otomatis terisi.</p>

            <div class="form-group">
                <label>🔗 Link YouTube</label>
                <input type="url" id="inputYoutube" placeholder="https://youtube.com/watch?v=..." />
            </div>

            <div class="form-group">
                <label>🎨 Cover URL</label>
                <input type="url" id="inputCover" placeholder="Otomatis terisi..." disabled />
            </div>

            <div class="form-group">
                <label>🎤 Judul Lagu</label>
                <input type="text" id="inputTitle" placeholder="Otomatis terisi..." disabled />
            </div>

            <div class="form-group">
                <label>👤 Nama Artis</label>
                <input type="text" id="inputArtist" placeholder="Otomatis terisi..." disabled />
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="cancelModal">Batal</button>
                <button class="btn-submit" id="submitModal">Tambah</button>
            </div>
        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================
        // KONFIGURASI - GANTI DENGAN URL APPS SCRIPT ANDA
        // ============================================
        const GOOGLE_SHEET_API_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';
        // ============================================

        // ----- STATE -----
        let tracks = [];
        let currentTrack = null;
        let player = null;
        let isPlaying = false;
        let playerInterval = null;
        let isSeeking = false;
        let searchQuery = '';

        // ----- DOM REFS -----
        const grid = document.getElementById('musicGrid');
        const searchInput = document.getElementById('searchInput');
        const trackCount = document.getElementById('trackCount');

        const playerCover = document.getElementById('playerCover');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const progressBar = document.getElementById('progressBar');
        const volumeControl = document.getElementById('volumeControl');

        const modalOverlay = document.getElementById('modalOverlay');
        const openModalBtn = document.getElementById('openAddModal');
        const cancelModalBtn = document.getElementById('cancelModal');
        const submitModalBtn = document.getElementById('submitModal');
        const inputYoutube = document.getElementById('inputYoutube');
        const inputCover = document.getElementById('inputCover');
        const inputTitle = document.getElementById('inputTitle');
        const inputArtist = document.getElementById('inputArtist');

        // ============================================
        // 1. FETCH DATA
        // ============================================
        async function fetchTracks() {
            showSkeletons();
            try {
                const res = await fetch(GOOGLE_SHEET_API_URL);
                const json = await res.json();
                if (json.success) {
                    tracks = json.data || [];
                } else {
                    console.error('Error:', json.error);
                    tracks = [];
                }
            } catch (err) {
                console.error('Fetch error:', err);
                tracks = [];
            }
            renderTracks();
        }

        // ============================================
        // 2. RENDER
        // ============================================
        function renderTracks() {
            const filtered = tracks.filter(t =>
                (t.Title || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                (t.Artist || '').toLowerCase().includes(searchQuery.toLowerCase())
            );

            trackCount.textContent = filtered.length + ' lagu';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;color:#7a7a7a;padding:40px 0;">
                        <p style="font-size:20px;">🎵</p>
                        <p>Tidak ada lagu ditemukan</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(t => `
                <div class="music-card" data-id="${t.ID}" data-youtube="${t.YoutubeUrl}">
                    <img class="card-cover" src="${t.CoverUrl || 'https://via.placeholder.com/180x180/333/555?text=No+Cover'}" 
                         alt="${t.Title}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/180x180/333/555?text=No+Cover'" />
                    <button class="delete-btn" data-id="${t.ID}" title="Hapus lagu">🗑️</button>
                    <div class="card-title">${t.Title || 'Untitled'}</div>
                    <div class="card-artist">${t.Artist || 'Unknown Artist'}</div>
                </div>
            `).join('');

            // Event: klik kartu = play
            document.querySelectorAll('.music-card').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn')) return;
                    const id = el.dataset.id;
                    const track = tracks.find(t => t.ID === id);
                    if (track) playTrack(track);
                });
            });

            // Event: tombol hapus
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    await deleteTrack(id);
                });
            });
        }

        // ----- SKELETON -----
        function showSkeletons() {
            grid.innerHTML = Array(8).fill(0).map(() => `
                <div class="skeleton-card">
                    <div class="skeleton-cover"></div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            `).join('');
        }

        // ============================================
        // 3. YOUTUBE PLAYER (IFRAME API)
        // ============================================
        function loadYouTubeAPI() {
            if (document.getElementById('youtube-api-script')) return;
            const script = document.createElement('script');
            script.id = 'youtube-api-script';
            script.src = 'https://www.youtube.com/iframe_api';
            script.async = true;
            document.head.appendChild(script);
        }

        let ytReady = false;

        function onYouTubeIframeAPIReady() {
            ytReady = true;
            // Player dibuat saat track diputar
        }

        // Untuk global callback dari YouTube API
        window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

        function createPlayer(videoId) {
            if (!ytReady) {
                console.warn('YouTube API belum siap, mencoba lagi...');
                setTimeout(() => createPlayer(videoId), 500);
                return;
            }
            if (player) {
                player.destroy();
                player = null;
            }
            const container = document.getElementById('youtube-player');
            player = new YT.Player(container, {
                height: 1,
                width: 1,
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                }
            });
        }

        function onPlayerReady(event) {
            if (volumeControl) {
                player.setVolume(volumeControl.value * 100);
            }
            if (isPlaying) {
                player.playVideo();
            } else {
                player.pauseVideo();
            }
            updateProgressLoop();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.textContent = '⏸';
                updateProgressLoop();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                playBtn.textContent = '▶';
                if (event.data === YT.PlayerState.ENDED) {
                    // Reset progress
                    progressFill.style.width = '0%';
                    currentTimeEl.textContent = '0:00';
                }
            }
        }

        function playTrack(track) {
            if (!track || !track.YoutubeUrl) return;
            const videoId = extractVideoId(track.YoutubeUrl);
            if (!videoId) {
                alert('Link YouTube tidak valid!');
                return;
            }

            currentTrack = track;
            playerCover.src = track.CoverUrl || 'https://via.placeholder.com/48x48/333/555?text=No+Cover';
            playerTitle.textContent = track.Title || 'Untitled';
            playerArtist.textContent = track.Artist || 'Unknown Artist';
            isPlaying = true;
            playBtn.textContent = '⏸';

            if (player) {
                player.loadVideoById(videoId);
                player.playVideo();
            } else {
                createPlayer(videoId);
            }
        }

        // ============================================
        // 4. PLAYER CONTROLS
        // ============================================
        function togglePlay() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function seekForward() {
            if (!player) return;
            const current = player.getCurrentTime();
            player.seekTo(Math.min(current + 5, player.getDuration()), true);
        }

        function seekBackward() {
            if (!player) return;
            const current = player.getCurrentTime();
            player.seekTo(Math.max(current - 5, 0), true);
        }

        function updateProgressLoop() {
            if (playerInterval) clearInterval(playerInterval);
            playerInterval = setInterval(() => {
                if (!player || !player.getCurrentTime) return;
                try {
                    const current = player.getCurrentTime() || 0;
                    const duration = player.getDuration() || 0;
                    const percent = duration > 0 ? (current / duration) * 100 : 0;
                    if (!isSeeking) {
                        progressFill.style.width = percent + '%';
                    }
                    currentTimeEl.textContent = formatTime(current);
                    totalTimeEl.textContent = formatTime(duration);
                } catch (e) { /* ignore */ }
            }, 200);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ============================================
        // 5. EXTRACT VIDEO ID
        // ============================================
        function extractVideoId(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?/#]+)/,
                /youtube\.com\/watch\?.*v=([^&]+)/,
                /youtu\.be\/([^?]+)/
            ];
            for (const p of patterns) {
                const match = url.match(p);
                if (match) return match[1];
            }
            // Coba ambil 11 karakter terakhir sebelum query
            const clean = url.split('?')[0].split('&')[0].split('#')[0];
            const parts = clean.split('/');
            const last = parts[parts.length - 1];
            if (last && last.length >= 11) {
                return last.substring(0, 11);
            }
            return null;
        }

        // ============================================
        // 6. MODAL - AUTOFILL & SUBMIT
        // ============================================
        let isSubmitting = false;

        openModalBtn.addEventListener('click', () => {
            modalOverlay.classList.add('open');
            inputYoutube.value = '';
            inputCover.value = '';
            inputTitle.value = '';
            inputArtist.value = '';
            inputYoutube.disabled = false;
            submitModalBtn.disabled = false;
            inputYoutube.focus();
        });

        cancelModalBtn.addEventListener('click', closeModal);

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        function closeModal() {
            modalOverlay.classList.remove('open');
            isSubmitting = false;
        }

        // Autofill saat paste atau input
        inputYoutube.addEventListener('input', async function() {
            const url = this.value.trim();
            const videoId = extractVideoId(url);
            if (!videoId) {
                inputCover.value = '';
                inputTitle.value = '';
                inputArtist.value = '';
                return;
            }

            // Set cover
            inputCover.value = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

            // Fetch title via noembed
            try {
                const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
                const data = await res.json();
                let title = data.title || '';
                if (title.includes(' - ')) {
                    const parts = title.split(' - ');
                    inputArtist.value = parts[0].trim() || 'Unknown Artist';
                    inputTitle.value = parts.slice(1).join(' - ').trim() || 'Untitled';
                } else {
                    inputTitle.value = title || 'Untitled';
                    inputArtist.value = 'Unknown Artist';
                }
            } catch (err) {
                console.warn('Gagal fetch title:', err);
                inputTitle.value = 'Untitled';
                inputArtist.value = 'Unknown Artist';
            }
        });

        // Submit
        submitModalBtn.addEventListener('click', async () => {
            if (isSubmitting) return;

            const youtubeUrl = inputYoutube.value.trim();
            const coverUrl = inputCover.value.trim();
            const title = inputTitle.value.trim() || 'Untitled';
            const artist = inputArtist.value.trim() || 'Unknown Artist';

            if (!youtubeUrl) {
                alert('Masukkan link YouTube terlebih dahulu!');
                return;
            }

            const videoId = extractVideoId(youtubeUrl);
            if (!videoId) {
                alert('Link YouTube tidak valid!');
                return;
            }

            // Cek duplikasi
            const exists = tracks.some(t => {
                const existingId = extractVideoId(t.YoutubeUrl);
                return existingId === videoId;
            });
            if (exists) {
                alert('⚠️ Lagu ini sudah ada di library lo!');
                return;
            }

            isSubmitting = true;
            submitModalBtn.disabled = true;
            submitModalBtn.textContent = 'Menyimpan...';

            try {
                const payload = {
                    action: 'add',
                    data: {
                        title: title,
                        artist: artist,
                        coverUrl: coverUrl,
                        youtubeUrl: youtubeUrl
                    }
                };

                const res = await fetch(GOOGLE_SHEET_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                // Karena mode no-cors, response tidak bisa dibaca
                // Tapi data sudah terkirim
                alert('✅ Lagu berhasil ditambahkan!');
                closeModal();
                await fetchTracks();

            } catch (err) {
                console.error('Submit error:', err);
                alert('❌ Gagal menambahkan lagu. Coba lagi.');
            } finally {
                isSubmitting = false;
                submitModalBtn.disabled = false;
                submitModalBtn.textContent = 'Tambah';
            }
        });

        // ============================================
        // 7. DELETE TRACK
        // ============================================
        async function deleteTrack(id) {
            if (!confirm('Yakin ingin menghapus lagu ini?')) return;

            try {
                const payload = {
                    action: 'delete',
                    id: id
                };

                await fetch(GOOGLE_SHEET_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                // Hapus dari state lokal
                tracks = tracks.filter(t => t.ID !== id);
                renderTracks();

                // Jika lagu yang sedang diputar dihapus
                if (currentTrack && currentTrack.ID === id) {
                    currentTrack = null;
                    playerCover.src = '';
                    playerTitle.textContent = 'Pilih lagu';
                    playerArtist.textContent = '-';
                    if (player) {
                        player.pauseVideo();
                        isPlaying = false;
                        playBtn.textContent = '▶';
                    }
                }

            } catch (err) {
                console.error('Delete error:', err);
                alert('❌ Gagal menghapus lagu.');
            }
        }

        // ============================================
        // 8. KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', (e) => {
            // Ignore jika sedang mengetik di input
            const tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

            switch (e.key) {
                case ' ':
                case 'Spacebar':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    seekForward();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    seekBackward();
                    break;
            }
        });

        // ============================================
        // 9. EVENT LISTENERS
        // ============================================
        // Play button
        playBtn.addEventListener('click', togglePlay);

        // Prev / Next (5s)
        prevBtn.addEventListener('click', seekBackward);
        nextBtn.addEventListener('click', seekForward);

        // Volume
        volumeControl.addEventListener('input', () => {
            if (player) {
                player.setVolume(volumeControl.value * 100);
            }
        });

        // Progress bar click
        progressBar.addEventListener('click', (e) => {
            if (!player) return;
            const rect = progressBar.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const duration = player.getDuration();
            if (duration > 0) {
                isSeeking = true;
                player.seekTo(x * duration, true);
                setTimeout(() => { isSeeking = false; }, 300);
            }
        });

        // Search
        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value.trim();
            renderTracks();
        });

        // ============================================
        // 10. INIT
        // ============================================
        loadYouTubeAPI();
        fetchTracks();

        // Refresh tiap 60 detik (sinkronisasi data)
        setInterval(fetchTracks, 60000);

        console.log('🎵 Music Tracker siap!');
    </script>
</body>
</html>
