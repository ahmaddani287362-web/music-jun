<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 8px;
            padding: 8px 8px 0 8px;
        }

        .sidebar {
            width: 240px;
            min-width: 200px;
            background: #121212;
            border-radius: 12px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo .icon {
            color: #1DB954;
        }

        .sidebar-btn {
            background: #1DB954;
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sidebar-btn:hover {
            background: #1ed760;
            transform: scale(1.02);
        }

        .main {
            flex: 1;
            background: #121212;
            border-radius: 12px;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-bar input {
            width: 100%;
            max-width: 400px;
            padding: 10px 16px 10px 44px;
            border-radius: 24px;
            border: none;
            background: #282828;
            color: #fff;
            font-size: 14px;
        }
        .search-bar input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #1DB954;
        }
        .search-bar {
            position: relative;
        }
        .search-bar .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a7a7a;
        }

        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grid-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .grid-header .count {
            color: #7a7a7a;
            font-size: 14px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 4px 0 20px 0;
        }

        .music-card {
            background: #181818;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .music-card:hover {
            background: #282828;
            transform: translateY(-4px);
        }

        .music-card .card-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            object-fit: cover;
            background: #333;
            margin-bottom: 12px;
        }

        .music-card .card-title {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .music-card .card-artist {
            font-size: 13px;
            color: #b3b3b3;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .music-card .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-card:hover .delete-btn {
            opacity: 1;
        }
        .music-card .delete-btn:hover {
            background: #e91429;
        }

        .skeleton-card {
            background: #181818;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .skeleton-card .skeleton-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            background: #282828;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .skeleton-card .skeleton-title {
            width: 80%;
            height: 16px;
            background: #282828;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .skeleton-card .skeleton-artist {
            width: 60%;
            height: 14px;
            background: #282828;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        @keyframes skeleton-pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        .player {
            background: #181818;
            border-top: 1px solid #282828;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
            height: 72px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 180px;
        }
        .player-info .player-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: #333;
            flex-shrink: 0;
        }
        .player-info .player-meta .p-title {
            font-size: 14px;
            font-weight: 600;
        }
        .player-info .player-meta .p-artist {
            font-size: 12px;
            color: #b3b3b3;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 600px;
            gap: 4px;
        }
        .player-controls .ctrl-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .player-controls .ctrl-buttons button {
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            padding: 4px;
        }
        .player-controls .ctrl-buttons button:hover {
            color: #fff;
        }
        .player-controls .ctrl-buttons .play-btn {
            font-size: 32px;
            color: #fff;
        }
        .player-controls .ctrl-buttons .play-btn:hover {
            color: #1DB954;
        }

        .player-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .player-progress .time {
            font-size: 11px;
            color: #b3b3b3;
            min-width: 40px;
        }
        .player-progress .progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .player-progress .progress-bar .progress-fill {
            height: 100%;
            background: #1DB954;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .player-volume input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        .player-volume input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #282828;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: modalSlide 0.25s ease;
        }
        @keyframes modalSlide {
            from {
                transform: translateY(20px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .modal .sub {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #b3b3b3;
            margin-bottom: 6px;
        }
        .modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #121212;
            color: #fff;
            font-size: 14px;
        }
        .modal .form-group input:focus {
            outline: none;
            border-color: #1DB954;
        }
        .modal .form-group input:disabled {
            opacity: 0.5;
        }

        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal .modal-actions button {
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modal .modal-actions .btn-cancel {
            background: #333;
            color: #fff;
        }
        .modal .modal-actions .btn-cancel:hover {
            background: #444;
        }
        .modal .modal-actions .btn-submit {
            background: #1DB954;
            color: #000;
        }
        .modal .modal-actions .btn-submit:hover {
            background: #1ed760;
        }

        #youtube-player {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #282828;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-left: 4px solid #e91429;
        }
        .toast.success {
            border-left: 4px solid #1DB954;
        }

        .btn-refresh {
            background: #333;
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            cursor: pointer;
        }
        .btn-refresh:hover {
            background: #444;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .music-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .player {
                flex-wrap: wrap;
                height: auto;
            }
            .player-volume {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <aside class="sidebar">
            <div class="logo"><span class="icon">🎵</span> Music Tracker</div>
            <button class="sidebar-btn" id="openAddModal">➕ Add Song</button>
            <hr style="border-color:#282828;" />
            <div class="sidebar-menu">
                <div style="padding:10px 14px;border-radius:8px;color:#fff;background:#282828;">🏠 Home</div>
            </div>
        </aside>

        <main class="main">
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                <div class="search-bar" style="flex:1;max-width:400px;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Cari lagu..." />
                </div>
                <button class="btn-refresh" id="refreshBtn">🔄 Refresh</button>
            </div>
            <div class="grid-header">
                <h2>Library</h2>
                <span class="count" id="trackCount">0 lagu</span>
            </div>
            <div class="music-grid" id="musicGrid"></div>
        </main>
    </div>

    <footer class="player" id="player">
        <div class="player-info">
            <img class="player-cover" id="playerCover" src="" />
            <div class="player-meta">
                <div class="p-title" id="playerTitle">Pilih lagu</div>
                <div class="p-artist" id="playerArtist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="ctrl-buttons">
                <button id="prevBtn">⏮</button>
                <button class="play-btn" id="playBtn">▶</button>
                <button id="nextBtn">⏭</button>
            </div>
            <div class="player-progress">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-volume">
            <input type="range" min="0" max="1" step="0.01" value="0.8" id="volumeControl" />
        </div>
    </footer>

    <div id="youtube-player"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>🎵 Tambah Lagu</h2>
            <p class="sub">Tempel link YouTube</p>
            <div class="form-group">
                <label>🔗 Link YouTube</label>
                <input type="url" id="inputYoutube" placeholder="https://youtube.com/watch?v=..." />
            </div>
            <div class="form-group">
                <label>🎨 Cover URL</label>
                <input type="url" id="inputCover" disabled />
            </div>
            <div class="form-group">
                <label>🎤 Judul Lagu</label>
                <input type="text" id="inputTitle" disabled />
            </div>
            <div class="form-group">
                <label>👤 Artis</label>
                <input type="text" id="inputArtist" disabled />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelModal">Batal</button>
                <button class="btn-submit" id="submitModal">Tambah</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ========================================
        // KONFIGURASI - GANTI CUMAN 2 INI DOANG!
        // ========================================

        // 1. URL Apps Script (dari deploy lo)
        var API_URL = 'https://script.google.com/macros/s/AKfycbzk05CpuqXnFyOkIkpFpkYghv0w_GI8TdjnueyLiPLZZ_h2EcGcsfXHZO4BbUqwDSFM2A/exec';

        // 2. Sheet ID (dari URL Google Sheet lo)
        var SHEET_ID = '1BAUrAY2caeycLY2Xu6i7punb3xonYEwnqCA5I1po-ok'; // <--- GANTI INI!

        // ========================================

        var tracks = [];
        var currentTrack = null;
        var player = null;
        var isPlaying = false;
        var playerInterval = null;
        var searchQuery = '';
        var isLoading = false;

        // DOM
        var grid = document.getElementById('musicGrid');
        var searchInput = document.getElementById('searchInput');
        var trackCount = document.getElementById('trackCount');
        var refreshBtn = document.getElementById('refreshBtn');
        var playerCover = document.getElementById('playerCover');
        var playerTitle = document.getElementById('playerTitle');
        var playerArtist = document.getElementById('playerArtist');
        var playBtn = document.getElementById('playBtn');
        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var progressFill = document.getElementById('progressFill');
        var currentTimeEl = document.getElementById('currentTime');
        var totalTimeEl = document.getElementById('totalTime');
        var progressBar = document.getElementById('progressBar');
        var volumeControl = document.getElementById('volumeControl');
        var modalOverlay = document.getElementById('modalOverlay');
        var openModalBtn = document.getElementById('openAddModal');
        var cancelModalBtn = document.getElementById('cancelModal');
        var submitModalBtn = document.getElementById('submitModal');
        var inputYoutube = document.getElementById('inputYoutube');
        var inputCover = document.getElementById('inputCover');
        var inputTitle = document.getElementById('inputTitle');
        var inputArtist = document.getElementById('inputArtist');
        var toast = document.getElementById('toast');

        var toastTimeout;

        function showToast(msg, type) {
            clearTimeout(toastTimeout);
            toast.textContent = msg;
            toast.className = 'toast show ' + (type || 'success');
            toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        // ============================================
        // FETCH DATA - PAKE PUBLISHED SHEET (NO API KEY!)
        // ============================================
        async function fetchTracks() {
            if (isLoading) return;
            isLoading = true;
            showSkeletons();

            try {
                // Pake Google Sheets published CSV - NO API KEY!
                var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';

                var res = await fetch(url);

                if (!res.ok) {
                    throw new Error('Gagal fetch: ' + res.status);
                }

                var text = await res.text();
                
                // Parse JSONP response
                var jsonString = text.substring(text.indexOf('(') + 1, text.lastIndexOf(')'));
                var json = JSON.parse(jsonString);
                
                var rows = json.table.rows;
                var cols = json.table.cols;
                
                if (rows && rows.length > 0) {
                    var headers = cols.map(function(c) { return c.label; });
                    
                    tracks = rows.map(function(row) {
                        var item = {};
                        var cells = row.c || [];
                        headers.forEach(function(h, i) {
                            item[h] = (cells[i] && cells[i].v !== null && cells[i].v !== undefined) ? String(cells[i].v) : '';
                        });
                        return item;
                    });
                    
                    renderTracks();
                    if (tracks.length === 0) {
                        showToast('Belum ada data', 'success');
                    }
                } else {
                    tracks = [];
                    renderTracks();
                    showToast('Belum ada data', 'success');
                }

            } catch (err) {
                console.error('Fetch error:', err);
                showToast('Gagal ambil data. Coba refresh.', 'error');
                tracks = [];
                renderTracks();
            }

            isLoading = false;
        }

        // ============================================
        // RENDER
        // ============================================
        function renderTracks() {
            var filtered = tracks.filter(function(t) {
                return (t.Title || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (t.Artist || '').toLowerCase().includes(searchQuery.toLowerCase());
            });

            trackCount.textContent = filtered.length + ' lagu';

            if (filtered.length === 0) {
                grid.innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;color:#7a7a7a;padding:40px 0;">' +
                    '<p style="font-size:40px;">🎵</p>' +
                    '<p>' + (searchQuery ? 'Tidak ada hasil' : 'Belum ada lagu') + '</p>' +
                    '</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var t = filtered[i];
                var cover = t.CoverUrl || 'https://via.placeholder.com/180x180/333/555?text=No+Cover';
                html += '<div class="music-card" data-id="' + t.ID + '" data-youtube="' + t.YoutubeUrl + '">' +
                    '<img class="card-cover" src="' + cover + '" onerror="this.src=\'https://via.placeholder.com/180x180/333/555?text=Error\'" />' +
                    '<button class="delete-btn" data-id="' + t.ID + '">🗑️</button>' +
                    '<div class="card-title">' + (t.Title || 'Untitled') + '</div>' +
                    '<div class="card-artist">' + (t.Artist || 'Unknown') + '</div>' +
                    '</div>';
            }
            grid.innerHTML = html;

            document.querySelectorAll('.music-card').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('.delete-btn')) return;
                    var id = this.dataset.id;
                    var track = tracks.find(function(t) { return t.ID === id; });
                    if (track) playTrack(track);
                });
            });

            document.querySelectorAll('.delete-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteTrack(this.dataset.id);
                });
            });
        }

        function showSkeletons() {
            var html = '';
            for (var i = 0; i < 8; i++) {
                html += '<div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-title"></div><div class="skeleton-artist"></div></div>';
            }
            grid.innerHTML = html;
        }

        // ============================================
        // YOUTUBE PLAYER
        // ============================================
        function loadYouTubeAPI() {
            if (document.getElementById('youtube-api-script')) return;
            var s = document.createElement('script');
            s.id = 'youtube-api-script';
            s.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(s);
        }

        var ytReady = false;
        window.onYouTubeIframeAPIReady = function() { ytReady = true; };

        function createPlayer(videoId) {
            if (!ytReady) { setTimeout(function() { createPlayer(videoId); }, 500); return; }
            if (player) { player.destroy();
                player = null; }
            player = new YT.Player('youtube-player', {
                height: 1,
                width: 1,
                videoId: videoId,
                playerVars: { autoplay: 1, controls: 0, disablekb: 1 },
                events: {
                    onReady: function() {
                        if (volumeControl) player.setVolume(volumeControl.value * 100);
                        if (isPlaying) player.playVideo();
                        else player.pauseVideo();
                        updateProgressLoop();
                    },
                    onStateChange: function(e) {
                        if (e.data === YT.PlayerState.PLAYING) {
                            isPlaying = true;
                            playBtn.textContent = '⏸';
                            updateProgressLoop();
                        } else if (e.data === YT.PlayerState.PAUSED) {
                            isPlaying = false;
                            playBtn.textContent = '▶';
                        } else if (e.data === YT.PlayerState.ENDED) {
                            isPlaying = false;
                            playBtn.textContent = '▶';
                            progressFill.style.width = '0%';
                            currentTimeEl.textContent = '0:00';
                        }
                    },
                    onError: function() {
                        showToast('Error play video', 'error');
                        isPlaying = false;
                        playBtn.textContent = '▶';
                    }
                }
            });
        }

        function playTrack(track) {
            if (!track || !track.YoutubeUrl) { showToast('Link invalid', 'error'); return; }
            var videoId = extractVideoId(track.YoutubeUrl);
            if (!videoId) { showToast('Link invalid', 'error'); return; }

            currentTrack = track;
            playerCover.src = track.CoverUrl || 'https://via.placeholder.com/48x48/333/555?text=No+Cover';
            playerTitle.textContent = track.Title || 'Untitled';
            playerArtist.textContent = track.Artist || 'Unknown';
            isPlaying = true;
            playBtn.textContent = '⏸';

            if (player) { player.loadVideoById(videoId);
                player.playVideo(); } else { createPlayer(videoId); }
        }

        function togglePlay() {
            if (!player) {
                if (tracks.length > 0) playTrack(tracks[0]);
                else showToast('Tidak ada lagu', 'error');
                return;
            }
            if (isPlaying) player.pauseVideo();
            else player.playVideo();
        }

        function seekForward() {
            if (!player) return;
            try { player.seekTo(Math.min(player.getCurrentTime() + 5, player.getDuration()), true); } catch (e) {}
        }

        function seekBackward() {
            if (!player) return;
            try { player.seekTo(Math.max(player.getCurrentTime() - 5, 0), true); } catch (e) {}
        }

        function updateProgressLoop() {
            if (playerInterval) clearInterval(playerInterval);
            playerInterval = setInterval(function() {
                if (!player || !player.getCurrentTime) return;
                try {
                    var c = player.getCurrentTime() || 0;
                    var d = player.getDuration() || 0;
                    progressFill.style.width = (d > 0 ? (c / d) * 100 : 0) + '%';
                    currentTimeEl.textContent = formatTime(c);
                    totalTimeEl.textContent = formatTime(d);
                } catch (e) {}
            }, 200);
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function extractVideoId(url) {
            if (!url) return null;
            var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?/#]+)/);
            if (m) return m[1];
            var last = url.split('?')[0].split('/').pop();
            return (last && last.length >= 11) ? last.substring(0, 11) : null;
        }

        // ============================================
        // ADD TRACK
        // ============================================
        var isSubmitting = false;
        var autofillTimeout;

        openModalBtn.addEventListener('click', function() {
            modalOverlay.classList.add('open');
            inputYoutube.value = '';
            inputCover.value = '';
            inputTitle.value = '';
            inputArtist.value = '';
            setTimeout(function() { inputYoutube.focus(); }, 100);
        });

        cancelModalBtn.addEventListener('click', function() { modalOverlay.classList.remove('open'); });
        modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) modalOverlay.classList.remove(
                'open'); });

        inputYoutube.addEventListener('input', function() {
            clearTimeout(autofillTimeout);
            var videoId = extractVideoId(this.value.trim());
            if (!videoId) { inputCover.value = '';
                inputTitle.value = '';
                inputArtist.value = ''; return; }

            inputCover.value = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';

            autofillTimeout = setTimeout(function() {
                fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + videoId)
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        var title = d.title || '';
                        if (title.includes(' - ')) {
                            var parts = title.split(' - ');
                            inputArtist.value = parts.slice(0, -1).join(' - ').trim() || 'Unknown';
                            inputTitle.value = parts[parts.length - 1].trim() || 'Untitled';
                        } else {
                            inputTitle.value = title || 'Untitled';
                            inputArtist.value = 'Unknown';
                        }
                    })
                    .catch(function() { inputTitle.value = 'Untitled';
                        inputArtist.value = 'Unknown'; });
            }, 500);
        });

        submitModalBtn.addEventListener('click', async function() {
            if (isSubmitting) return;

            var youtubeUrl = inputYoutube.value.trim();
            var title = inputTitle.value.trim() || 'Untitled';
            var artist = inputArtist.value.trim() || 'Unknown';
            var cover = inputCover.value.trim();

            if (!youtubeUrl) { showToast('Masukkan link YouTube!', 'error'); return; }

            var videoId = extractVideoId(youtubeUrl);
            if (!videoId) { showToast('Link YouTube tidak valid!', 'error'); return; }

            // Cek duplikasi
            var exists = tracks.some(function(t) {
                return extractVideoId(t.YoutubeUrl) === videoId;
            });
            if (exists) { showToast('⚠️ Lagu sudah ada!', 'error'); return; }

            isSubmitting = true;
            submitModalBtn.disabled = true;
            submitModalBtn.textContent = 'Menyimpan...';

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'add',
                        data: { title: title, artist: artist, coverUrl: cover, youtubeUrl: youtubeUrl }
                    })
                });

                showToast('✅ Berhasil!', 'success');
                modalOverlay.classList.remove('open');
                setTimeout(fetchTracks, 1500);

            } catch (err) {
                showToast('❌ Gagal', 'error');
            } finally {
                isSubmitting = false;
                submitModalBtn.disabled = false;
                submitModalBtn.textContent = 'Tambah';
            }
        });

        // ============================================
        // DELETE TRACK
        // ============================================
        async function deleteTrack(id) {
            if (!confirm('Hapus lagu ini?')) return;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', id: id })
                });

                showToast('🗑️ Terhapus!', 'success');
                tracks = tracks.filter(function(t) { return t.ID !== id; });
                renderTracks();

                if (currentTrack && currentTrack.ID === id) {
                    currentTrack = null;
                    playerCover.src = '';
                    playerTitle.textContent = 'Pilih lagu';
                    playerArtist.textContent = '-';
                    if (player) { player.pauseVideo();
                        isPlaying = false;
                        playBtn.textContent = '▶'; }
                }

                setTimeout(fetchTracks, 1000);

            } catch (err) {
                showToast('❌ Gagal hapus', 'error');
            }
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', function(e) {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
            if (e.key === ' ' || e.key === 'Space') { e.preventDefault();
                togglePlay(); }
            if (e.key === 'ArrowRight') { e.preventDefault();
                seekForward(); }
            if (e.key === 'ArrowLeft') { e.preventDefault();
                seekBackward(); }
        });

        // ============================================
        // EVENT LISTENERS
        // ============================================
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', seekBackward);
        nextBtn.addEventListener('click', seekForward);
        refreshBtn.addEventListener('click', fetchTracks);

        volumeControl.addEventListener('input', function() {
            if (player) player.setVolume(this.value * 100);
        });

        progressBar.addEventListener('click', function(e) {
            if (!player) return;
            var x = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
            var d = player.getDuration();
            if (d > 0) player.seekTo(x * d, true);
        });

        searchInput.addEventListener('input', function() {
            searchQuery = this.value.trim();
            renderTracks();
        });

        // ============================================
        // INIT
        // ============================================
        console.log('🎵 Music Tracker');
        loadYouTubeAPI();
        fetchTracks();
        setInterval(fetchTracks, 30000);
    </script>
</body>
</html>
