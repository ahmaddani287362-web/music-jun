<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Tracker</title>
<style>
  /* ==========================================================
     ROOT & RESET
  ========================================================== */
  :root{
    --bg-app: #000000;
    --bg-base: #121212;
    --bg-elevated: #1a1a1a;
    --bg-card: #181818;
    --bg-card-hover: #282828;
    --bg-sidebar: #000000;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --text-muted: #727272;
    --accent: #1DB954;
    --accent-hover: #1ed760;
    --accent-dark: #168d3f;
    --border-subtle: #2a2a2a;
    --danger: #f15e6c;
    --shadow: 0 8px 24px rgba(0,0,0,.5);
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --sidebar-w: 240px;
    --player-h: 90px;
    --topbar-h: 64px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    background: var(--bg-app);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  ::-webkit-scrollbar{ width: 12px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background-color: rgba(255,255,255,.15); border-radius: 10px; border:3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover{ background-color: rgba(255,255,255,.3); background-clip: content-box; }

  button{ font-family: inherit; cursor: pointer; border:none; outline: none; background: none; color: inherit; }
  input{ font-family: inherit; }
  a{ color: inherit; text-decoration: none; }
  img{ display:block; max-width:100%; }

  button:focus-visible,
  input:focus-visible,
  [tabindex]:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ==========================================================
     APP SHELL
  ========================================================== */
  .app{
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 1fr var(--player-h);
    height: 100vh;
    gap: 8px;
    padding: 8px;
    background: var(--bg-app);
  }

  /* ==========================================================
     SIDEBAR
  ========================================================== */
  .sidebar{
    background: var(--bg-sidebar);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 20px 16px;
    overflow-y: auto;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 0 4px 16px;
    margin-bottom: 8px;
  }

  .brand-logo{
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .brand-logo svg{ width:18px; height:18px; fill:#000; }

  .brand-name{
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .nav-list{ list-style: none; display:flex; flex-direction: column; gap: 2px; }

  .nav-item{
    display:flex;
    align-items:center;
    gap:16px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-weight: 700;
    font-size: 14px;
    transition: color .15s ease, background-color .15s ease;
    width: 100%;
    text-align: left;
  }
  .nav-item svg{ width:22px; height:22px; flex-shrink:0; }
  .nav-item:hover{ color: var(--text-primary); }
  .nav-item.active{ color: var(--text-primary); background: var(--bg-elevated); }

  .sidebar-divider{
    height: 1px;
    background: var(--border-subtle);
    margin: 12px 4px;
  }

  .add-song-btn{
    display:flex;
    align-items:center;
    gap:12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-weight: 700;
    font-size: 14px;
    transition: color .15s ease;
  }
  .add-song-btn:hover{ color: var(--text-primary); }
  .add-song-btn .icon-box{
    width: 24px; height: 24px;
    border-radius: 3px;
    background: var(--text-secondary);
    display:flex; align-items:center; justify-content:center;
    transition: background-color .15s ease;
  }
  .add-song-btn:hover .icon-box{ background: var(--text-primary); }
  .add-song-btn .icon-box svg{ width:14px; height:14px; fill: var(--bg-app); }

  .sidebar-footer{
    margin-top: auto;
    padding: 12px 4px 4px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ==========================================================
     MAIN AREA
  ========================================================== */
  .main{
    background: linear-gradient(180deg, #1f1f1f 0%, var(--bg-base) 320px);
    border-radius: var(--radius-md);
    overflow-y: auto;
    position: relative;
  }

  .topbar{
    position: sticky;
    top: 0;
    z-index: 5;
    height: var(--topbar-h);
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 32px;
    background: rgba(18,18,18,0.6);
    backdrop-filter: blur(12px);
  }

  .nav-arrows{ display:flex; gap:8px; }
  .nav-arrows button{
    width: 32px; height:32px;
    border-radius:50%;
    background: rgba(0,0,0,.6);
    display:flex; align-items:center; justify-content:center;
    color: var(--text-primary);
  }
  .nav-arrows button svg{ width:18px; height:18px; }

  .search-wrap{
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  .search-wrap svg{
    position:absolute;
    left:14px; top:50%; transform:translateY(-50%);
    width:18px; height:18px;
    fill: var(--text-primary);
    pointer-events: none;
  }
  .search-input{
    width:100%;
    background: var(--bg-elevated);
    border: 1px solid transparent;
    border-radius: 500px;
    padding: 10px 14px 10px 42px;
    font-size: 14px;
    color: var(--text-primary);
    transition: background-color .15s ease, border-color .15s ease;
  }
  .search-input::placeholder{ color: var(--text-muted); }
  .search-input:focus{ background:#242424; border-color:#535353; outline:none; }

  .topbar-right{ display:flex; align-items:center; gap: 18px; }
  .refresh-btn{
    display:flex; align-items:center; gap:8px;
    font-size: 13px; font-weight:700; color: var(--text-secondary);
    padding: 8px 14px;
    border-radius: 500px;
    border: 1px solid #454545;
    transition: border-color .15s ease, color .15s ease, transform .1s ease;
  }
  .refresh-btn:hover{ color:var(--text-primary); border-color: var(--text-primary); }
  .refresh-btn:active{ transform: scale(0.97); }
  .refresh-btn svg{ width:14px; height:14px; fill:currentColor; }
  .refresh-btn.loading svg{ animation: spin 0.8s linear infinite; }
  @keyframes spin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }

  .avatar-pill{
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #535353;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight:700;
    color:#fff;
  }

  .content{ padding: 24px 32px 40px; }

  .page-heading{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .page-heading h1{
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .song-count{
    font-size: 13px;
    color: var(--text-muted);
  }

  .status-banner{
    display:flex; align-items:center; gap:10px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-subtle);
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .status-banner.error{ background: rgba(241,94,108,0.08); border-color: rgba(241,94,108,0.3); color:#ffb3ba; }
  .status-banner code{
    background: rgba(255,255,255,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }

  /* ==========================================================
     GRID / CARDS
  ========================================================== */
  .song-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
  }

  .song-card{
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 14px;
    position: relative;
    transition: background-color .2s ease;
    cursor: pointer;
  }
  .song-card:hover{ background: var(--bg-card-hover); }
  .song-card.is-active{ background: var(--bg-card-hover); }
  .song-card.is-active .song-title{ color: var(--accent); }

  .card-cover-wrap{
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    background: #333;
  }
  .card-cover-wrap img{
    width:100%; height:100%; object-fit: cover;
    display:block;
  }

  .card-play-btn{
    position:absolute;
    right: 8px; bottom: 8px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 16px rgba(0,0,0,.5);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s ease, transform .2s ease, background-color .15s ease, transform .1s ease;
  }
  .card-play-btn svg{ width:18px; height:18px; fill:#000; margin-left:2px; }
  .song-card:hover .card-play-btn,
  .song-card.is-active .card-play-btn{ opacity:1; transform: translateY(0); }
  .card-play-btn:hover{ background: var(--accent-hover); transform: scale(1.06); }
  .card-play-btn.is-playing svg{ margin-left:0; }

  .song-title{
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .song-artist{
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty-state{
    grid-column: 1 / -1;
    text-align:center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state h3{ color: var(--text-secondary); font-size: 18px; margin-bottom: 8px; }
  .empty-state svg{ width:48px; height:48px; fill: var(--text-muted); margin-bottom: 16px; }

  .skeleton-card .card-cover-wrap,
  .skeleton-line{
    background: linear-gradient(100deg, #1e1e1e 30%, #2a2a2a 50%, #1e1e1e 70%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .skeleton-line{ height:14px; border-radius:4px; margin-bottom:8px; width: 80%; }
  .skeleton-line.short{ width: 50%; }
  @keyframes shimmer{ 0%{ background-position: 200% 0; } 100%{ background-position: -200% 0; } }

  /* ==========================================================
     BOTTOM PLAYER BAR
  ========================================================== */
  .player-bar{
    grid-column: 1 / -1;
    background: var(--bg-sidebar);
    border-radius: var(--radius-md);
    display:grid;
    grid-template-columns: 1fr minmax(0, 2fr) 1fr;
    align-items:center;
    padding: 0 16px;
    gap: 16px;
  }

  .player-now-playing{
    display:flex; align-items:center; gap:12px;
    min-width: 0;
  }
  .player-cover{
    width: 56px; height:56px;
    border-radius: 4px;
    object-fit: cover;
    background: #333;
    flex-shrink:0;
  }
  .player-meta{ min-width:0; }
  .player-song-title{
    font-size: 14px; font-weight:600;
    white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .player-song-artist{
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .player-like-btn svg{ width:16px; height:16px; fill: var(--text-secondary); transition: fill .15s ease; flex-shrink:0; }
  .player-like-btn:hover svg{ fill: var(--text-primary); }
  .player-like-btn.liked svg{ fill: var(--accent); }

  .player-center{
    display:flex; flex-direction:column; align-items:center; gap: 6px;
    width:100%;
    max-width: 560px;
    margin: 0 auto;
  }
  .player-controls{ display:flex; align-items:center; gap: 18px; }
  .ctrl-btn{ color: var(--text-secondary); transition: color .15s ease, transform .1s ease; }
  .ctrl-btn:hover{ color: var(--text-primary); }
  .ctrl-btn:active{ transform: scale(0.92); }
  .ctrl-btn svg{ width:16px; height:16px; fill: currentColor; }
  .ctrl-btn.play-toggle{
    width: 32px; height:32px;
    border-radius:50%;
    background: var(--text-primary);
    display:flex; align-items:center; justify-content:center;
  }
  .ctrl-btn.play-toggle svg{ fill:#000; width:14px; height:14px; }
  .ctrl-btn.play-toggle:hover{ transform: scale(1.05); }

  .progress-row{
    display:flex; align-items:center; gap:8px; width:100%;
  }
  .time-label{ font-size:11px; color: var(--text-muted); min-width: 36px; text-align:center; user-select:none; }
  .progress-track{
    flex:1;
    height:4px;
    background: #4d4d4d;
    border-radius: 2px;
    position:relative;
    cursor: pointer;
  }
  .progress-fill{
    position:absolute; left:0; top:0; bottom:0;
    background: var(--text-primary);
    border-radius: 2px;
    width:0%;
  }
  .progress-track:hover .progress-fill{ background: var(--accent); }
  .progress-track:hover .progress-fill::after{ opacity:1; }
  .progress-fill::after{
    content:'';
    position:absolute; right:-6px; top:50%; transform:translateY(-50%);
    width:12px; height:12px; border-radius:50%;
    background: var(--text-primary);
    opacity:0;
    transition: opacity .15s ease;
  }

  .player-right{
    display:flex; align-items:center; justify-content:flex-end; gap: 14px;
  }
  .volume-row{ display:flex; align-items:center; gap:8px; }
  .volume-track{
    width: 90px; height:4px;
    background: #4d4d4d;
    border-radius:2px;
    position:relative;
    cursor:pointer;
  }
  .volume-fill{
    position:absolute; left:0; top:0; bottom:0;
    background: var(--text-primary);
    border-radius:2px;
    width:70%;
  }
  .volume-track:hover .volume-fill{ background: var(--accent); }

  .yt-mini-wrap{
    position: fixed;
    bottom: 106px;
    right: 16px;
    width: 220px;
    aspect-ratio: 16/9;
    border-radius: var(--radius-md);
    overflow:hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-subtle);
    background:#000;
    z-index: 40;
    transition: transform .25s ease, opacity .25s ease;
  }
  .yt-mini-wrap.hidden{ transform: translateY(20px); opacity:0; pointer-events:none; }
  .yt-mini-wrap iframe{ width:100%; height:100%; border:0; display:block; }
  .yt-mini-close{
    position:absolute; top:4px; right:4px;
    width:22px; height:22px;
    border-radius:50%;
    background: rgba(0,0,0,.7);
    display:flex; align-items:center; justify-content:center;
    z-index: 2;
  }
  .yt-mini-close svg{ width:12px; height:12px; fill:#fff; }

  /* ==========================================================
     MODAL
  ========================================================== */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 100;
    padding: 20px;
    opacity:0;
    pointer-events:none;
    transition: opacity .2s ease;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }

  .modal{
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y:auto;
    padding: 28px;
    transform: scale(.96) translateY(8px);
    transition: transform .2s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal-overlay.open .modal{ transform: scale(1) translateY(0); }

  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 22px;
  }
  .modal-header h2{ font-size: 20px; font-weight:800; }
  .modal-close{
    width:28px; height:28px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color: var(--text-secondary);
  }
  .modal-close:hover{ background: rgba(255,255,255,.1); color:var(--text-primary); }
  .modal-close svg{ width:16px; height:16px; fill:currentColor; }

  .form-group{ margin-bottom: 18px; }
  .form-group label{
    display:block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .form-group input{
    width:100%;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    font-size: 14px;
    color: var(--text-primary);
    transition: border-color .15s ease;
  }
  .form-group input:focus{ border-color: var(--text-primary); outline:none; }
  .form-hint{ font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .cover-preview{
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: var(--radius-sm);
    background: #2a2a2a;
    margin-top:10px;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .cover-preview img{ width:100%; height:100%; object-fit:cover; }
  .cover-preview span{ font-size:12px; color: var(--text-muted); }

  .modal-actions{
    display:flex; justify-content:flex-end; gap: 12px;
    margin-top: 24px;
  }
  .btn{
    padding: 11px 24px;
    border-radius: 500px;
    font-size: 14px;
    font-weight: 700;
    transition: transform .1s ease, background-color .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-ghost{ color: var(--text-secondary); }
  .btn-ghost:hover{ color: var(--text-primary); }
  .btn-primary{
    background: var(--accent);
    color:#000;
  }
  .btn-primary:hover{ background: var(--accent-hover); }
  .btn-primary:disabled{
    background: #3a3a3a;
    color: var(--text-muted);
    cursor: not-allowed;
    transform:none;
  }
  .btn-primary .spinner{
    display:inline-block;
    width:14px; height:14px;
    border-radius:50%;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color:#000;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right:6px;
  }

  .toast-wrap{
    position: fixed;
    bottom: 106px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 200;
    display:flex;
    flex-direction: column;
    gap: 8px;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease, transform .25s ease;
  }
  .toast-wrap.show{ opacity:1; transform: translateX(-50%) translateY(0); }
  .toast{
    background: #fff;
    color:#000;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
  }
  .toast.error{ background: var(--danger); color:#fff; }

  /* ==========================================================
     RESPONSIVE
  ========================================================== */
  @media (max-width: 900px){
    :root{ --sidebar-w: 76px; }
    .brand-name, .nav-item span, .add-song-btn span, .sidebar-footer{ display:none; }
    .brand{ justify-content:center; }
    .nav-item, .add-song-btn{ justify-content:center; }
    .sidebar{ padding: 20px 10px; align-items:center; }
    .player-bar{ grid-template-columns: auto 1fr auto; }
    .player-now-playing{ max-width: 160px; }
    .player-right .volume-row{ display:none; }
  }

  @media (max-width: 640px){
    .app{ padding: 4px; gap:4px; grid-template-rows: 1fr 130px; }
    :root{ --sidebar-w: 0px; --player-h: 130px; }
    .sidebar{ display:none; }
    .content{ padding: 16px; }
    .topbar{ padding: 0 16px; }
    .search-wrap{ max-width: none; }
    .nav-arrows{ display:none; }
    .player-bar{
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      padding: 10px 16px;
      row-gap: 6px;
    }
    .player-right{ display:none; }
    .song-grid{ grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap:14px; }
    .yt-mini-wrap{ width: 140px; bottom: 148px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* =====================================================================
   KONFIGURASI — EDIT BAGIAN INI SESUAI GOOGLE APPS SCRIPT WEB APP ANDA
   =====================================================================
   1. Buat Google Sheet dengan kolom (header di baris 1):
      ID | Judul Lagu | Musisi | Link Cover Gambar | Link YouTube
   2. Deploy Google Apps Script sebagai Web App (Execute as: Me,
      Access: Anyone) yang menghandle:
        - doGet()  -> mengembalikan JSON array of songs
        - doPost() -> menerima JSON body lagu baru, menambah row baru
   3. Tempel URL Web App tersebut di bawah ini.
   ===================================================================== */
const CONFIG = {
  GOOGLE_SHEET_API_URL: "https://script.google.com/macros/s/GANTI_DENGAN_DEPLOYMENT_ID_ANDA/exec",
  // Jika true, dan fetch ke Google Sheet gagal/URL belum diisi,
  // aplikasi akan memakai data contoh (MOCK) agar tetap bisa didemokan.
  USE_MOCK_FALLBACK: true
};

/* =====================================================================
   MOCK DATA — hanya dipakai sebagai fallback bila API belum dikonfigurasi
   ===================================================================== */
const MOCK_SONGS = [
  { id: "1", title: "Blinding Lights", artist: "The Weeknd", cover: "https://i.scdn.co/image/ab67616d0000b273c6f7af36ecc47c5e6b8b8e5b", youtube: "https://www.youtube.com/watch?v=4NRXx6U8ABQ" },
  { id: "2", title: "Levitating", artist: "Dua Lipa", cover: "https://i.scdn.co/image/ab67616d0000b273ef24c3fdbf856340d8ff3c0e", youtube: "https://www.youtube.com/watch?v=TUVcZfQe-Kw" },
  { id: "3", title: "Sunflower", artist: "Post Malone, Swae Lee", cover: "https://i.scdn.co/image/ab67616d0000b2735d4a5b6b5b6a3f5f8b0d9a2f", youtube: "https://www.youtube.com/watch?v=ApXoWvfEYVU" },
  { id: "4", title: "As It Was", artist: "Harry Styles", cover: "https://i.scdn.co/image/ab67616d0000b273b46f74097655d7f353caab14", youtube: "https://www.youtube.com/watch?v=H5v3kku4y6Q" },
  { id: "5", title: "Peaches", artist: "Justin Bieber", cover: "https://i.scdn.co/image/ab67616d0000b273e6f407c7f3a0ec98845e4431", youtube: "https://www.youtube.com/watch?v=tQ0yjYUFKAE" },
  { id: "6", title: "Save Your Tears", artist: "The Weeknd", cover: "https://i.scdn.co/image/ab67616d0000b273c6f7af36ecc47c5e6b8b8e5b", youtube: "https://www.youtube.com/watch?v=XXYlFuWEuKI" }
];

/* =====================================================================
   STATE
   ===================================================================== */
const state = {
  songs: [],
  filteredSongs: [],
  currentIndex: -1,
  isPlaying: false,
  isMuted: false,
  volume: 70,
  likedIds: new Set(),
  ytReady: false,
  ytPlayer: null,
  pendingVideoId: null,
  progressTimer: null
};

/* =====================================================================
   DOM REFERENCES
   ===================================================================== */
const el = {
  songGrid: document.getElementById('songGrid'),
  songCount: document.getElementById('songCount'),
  statusBanner: document.getElementById('statusBanner'),
  searchInput: document.getElementById('searchInput'),
  refreshBtn: document.getElementById('refreshBtn'),

  playerCover: document.getElementById('playerCover'),
  playerTitle: document.getElementById('playerTitle'),
  playerArtist: document.getElementById('playerArtist'),
  likeBtn: document.getElementById('likeBtn'),

  playToggleBtn: document.getElementById('playToggleBtn'),
  playIcon: document.getElementById('playIcon'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  shuffleBtn: document.getElementById('shuffleBtn'),
  repeatBtn: document.getElementById('repeatBtn'),

  progressTrack: document.getElementById('progressTrack'),
  progressFill: document.getElementById('progressFill'),
  currentTime: document.getElementById('currentTime'),
  durationTime: document.getElementById('durationTime'),

  volumeTrack: document.getElementById('volumeTrack'),
  volumeFill: document.getElementById('volumeFill'),
  muteBtn: document.getElementById('muteBtn'),

  ytMiniWrap: document.getElementById('ytMiniWrap'),
  ytMiniClose: document.getElementById('ytMiniClose'),

  modalOverlay: document.getElementById('modalOverlay'),
  openModalBtn: document.getElementById('openModalBtn'),
  closeModalBtn: document.getElementById('closeModalBtn'),
  cancelModalBtn: document.getElementById('cancelModalBtn'),
  addSongForm: document.getElementById('addSongForm'),
  inputTitle: document.getElementById('inputTitle'),
  inputArtist: document.getElementById('inputArtist'),
  inputCover: document.getElementById('inputCover'),
  inputYoutube: document.getElementById('inputYoutube'),
  coverPreview: document.getElementById('coverPreview'),
  submitSongBtn: document.getElementById('submitSongBtn'),

  toastWrap: document.getElementById('toastWrap'),
  toastMsg: document.getElementById('toastMsg')
};

document.getElementById('year').textContent = new Date().getFullYear();

/* =====================================================================
   UTIL
   ===================================================================== */
function extractYoutubeId(url){
  if(!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([\w-]{11})/,
    /(?:youtu\.be\/)([\w-]{11})/,
    /(?:youtube\.com\/embed\/)([\w-]{11})/
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m) return m[1];
  }
  return null;
}

function formatTime(seconds){
  if(!isFinite(seconds) || seconds < 0) seconds = 0;
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function showToast(message, isError = false){
  el.toastMsg.textContent = message;
  el.toastMsg.classList.toggle('error', isError);
  el.toastWrap.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.toastWrap.classList.remove('show'), 3200);
}

function showStatus(message, isError = false){
  el.statusBanner.style.display = 'flex';
  el.statusBanner.classList.toggle('error', isError);
  el.statusBanner.innerHTML = message;
}
function hideStatus(){ el.statusBanner.style.display = 'none'; }

function normalizeSong(raw, fallbackIndex){
  // Menyesuaikan berbagai kemungkinan nama kolom dari Google Sheet / Apps Script
  return {
    id: String(raw.id ?? raw.ID ?? raw.Id ?? fallbackIndex),
    title: raw.title ?? raw['Judul Lagu'] ?? raw.judul ?? 'Tanpa Judul',
    artist: raw.artist ?? raw.Musisi ?? raw.musisi ?? 'Tidak diketahui',
    cover: raw.cover ?? raw['Link Cover Gambar'] ?? raw.cover_url ?? '',
    youtube: raw.youtube ?? raw['Link YouTube'] ?? raw.youtube_url ?? ''
  };
}

/* =====================================================================
   RENDER: SKELETON / GRID / EMPTY STATE
   ===================================================================== */
function renderSkeleton(count = 8){
  el.songGrid.innerHTML = '';
  for(let i=0;i<count;i++){
    const card = document.createElement('div');
    card.className = 'song-card skeleton-card';
    card.innerHTML = `
      <div class="card-cover-wrap"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    `;
    el.songGrid.appendChild(card);
  }
}

function renderEmptyState(){
  el.songGrid.innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>
      <h3>Belum ada lagu</h3>
      <p>Klik "Tambah Lagu" di sidebar untuk mulai membangun koleksimu.</p>
    </div>
  `;
}

function renderGrid(){
  const list = state.filteredSongs;
  el.songCount.textContent = list.length ? `${list.length} lagu` : '';

  if(list.length === 0){
    if(state.songs.length === 0){
      renderEmptyState();
    } else {
      el.songGrid.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.3 14.1l4.8 4.8 1.4-1.4-4.8-4.8A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
          <h3>Tidak ditemukan</h3>
          <p>Coba kata kunci pencarian lain.</p>
        </div>
      `;
    }
    return;
  }

  el.songGrid.innerHTML = '';
  list.forEach((song) => {
    const globalIndex = state.songs.findIndex(s => s.id === song.id);
    const isActive = globalIndex === state.currentIndex;
    const card = document.createElement('div');
    card.className = 'song-card' + (isActive ? ' is-active' : '');
    card.dataset.id = song.id;
    card.innerHTML = `
      <div class="card-cover-wrap">
        <img src="${song.cover || fallbackCoverDataUri()}" alt="Cover ${escapeHtml(song.title)}"
             onerror="this.onerror=null;this.src='${fallbackCoverDataUri()}'">
        <button class="card-play-btn ${isActive && state.isPlaying ? 'is-playing' : ''}" aria-label="Putar ${escapeHtml(song.title)}">
          ${isActive && state.isPlaying ? pauseIconSvg() : playIconSvg()}
        </button>
      </div>
      <div class="song-title">${escapeHtml(song.title)}</div>
      <div class="song-artist">${escapeHtml(song.artist)}</div>
    `;
    card.addEventListener('click', () => playSongById(song.id));
    el.songGrid.appendChild(card);
  });
}

function playIconSvg(){ return `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`; }
function pauseIconSvg(){ return `<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>`; }

function fallbackCoverDataUri(){
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">
      <rect width="300" height="300" fill="#333"/>
      <text x="50%" y="50%" fill="#888" font-size="18" font-family="sans-serif" text-anchor="middle" dy=".3em">No Cover</text>
    </svg>`);
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = String(str ?? '');
  return d.innerHTML;
}

/* =====================================================================
   FETCH DATA DARI GOOGLE SHEETS
   ===================================================================== */
async function loadSongs(){
  renderSkeleton();
  hideStatus();
  el.refreshBtn.classList.add('loading');

  const isConfigured = CONFIG.GOOGLE_SHEET_API_URL && !CONFIG.GOOGLE_SHEET_API_URL.includes('GANTI_DENGAN');

  if(!isConfigured){
    if(CONFIG.USE_MOCK_FALLBACK){
      showStatus(`Mode demo: <code>GOOGLE_SHEET_API_URL</code> belum diisi. Menampilkan data contoh. Edit variabel <code>CONFIG</code> di script untuk menghubungkan Google Sheets.`);
      state.songs = MOCK_SONGS.map(normalizeSong);
      state.filteredSongs = [...state.songs];
      renderGrid();
    } else {
      showStatus('URL Google Sheet API belum dikonfigurasi.', true);
      state.songs = [];
      state.filteredSongs = [];
      renderGrid();
    }
    el.refreshBtn.classList.remove('loading');
    return;
  }

  try{
    const res = await fetch(CONFIG.GOOGLE_SHEET_API_URL, { method: 'GET' });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const rows = Array.isArray(data) ? data : (data.data || data.songs || []);
    state.songs = rows.map((raw, i) => normalizeSong(raw, i+1));
    state.filteredSongs = [...state.songs];
    renderGrid();
  }catch(err){
    console.error('Gagal fetch Google Sheet:', err);
    if(CONFIG.USE_MOCK_FALLBACK){
      showStatus(`Gagal memuat data dari Google Sheets (${escapeHtml(err.message)}). Menampilkan data contoh sebagai fallback.`, true);
      state.songs = MOCK_SONGS.map(normalizeSong);
    } else {
      showStatus(`Gagal memuat data dari Google Sheets: ${escapeHtml(err.message)}`, true);
      state.songs = [];
    }
    state.filteredSongs = [...state.songs];
    renderGrid();
  }finally{
    el.refreshBtn.classList.remove('loading');
  }
}

/* =====================================================================
   SEARCH (REAL-TIME)
   ===================================================================== */
el.searchInput.addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  state.filteredSongs = !q
    ? [...state.songs]
    : state.songs.filter(s =>
        s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
      );
  renderGrid();
});

el.refreshBtn.addEventListener('click', loadSongs);

/* =====================================================================
   MODAL: TAMBAH LAGU
   ===================================================================== */
function openModal(){
  el.modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  el.inputTitle.focus();
}
function closeModal(){
  el.modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
  el.addSongForm.reset();
  el.coverPreview.innerHTML = '<span>Preview cover akan tampil di sini</span>';
}

el.openModalBtn.addEventListener('click', openModal);
el.closeModalBtn.addEventListener('click', closeModal);
el.cancelModalBtn.addEventListener('click', closeModal);
el.modalOverlay.addEventListener('click', (e) => { if(e.target === el.modalOverlay) closeModal(); });
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && el.modalOverlay.classList.contains('open')) closeModal();
});

el.inputCover.addEventListener('input', () => {
  const url = el.inputCover.value.trim();
  if(url){
    el.coverPreview.innerHTML = `<img src="${url}" alt="Preview" onerror="this.onerror=null; this.parentElement.innerHTML='<span>Gambar gagal dimuat</span>';">`;
  } else {
    el.coverPreview.innerHTML = '<span>Preview cover akan tampil di sini</span>';
  }
});

el.addSongForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const newSong = {
    title: el.inputTitle.value.trim(),
    artist: el.inputArtist.value.trim(),
    cover: el.inputCover.value.trim(),
    youtube: el.inputYoutube.value.trim()
  };

  if(!extractYoutubeId(newSong.youtube)){
    showToast('Link YouTube tidak valid. Pastikan formatnya benar.', true);
    return;
  }

  const isConfigured = CONFIG.GOOGLE_SHEET_API_URL && !CONFIG.GOOGLE_SHEET_API_URL.includes('GANTI_DENGAN');

  el.submitSongBtn.disabled = true;
  el.submitSongBtn.innerHTML = '<span class="spinner"></span>Menyimpan...';

  try{
    if(isConfigured){
      // Kirim POST request ke Google Apps Script Web App.
      // Catatan: Apps Script Web App umumnya butuh Content-Type text/plain
      // agar tidak memicu CORS preflight (OPTIONS) yang tidak didukung.
      const res = await fetch(CONFIG.GOOGLE_SHEET_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(newSong)
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const result = await res.json().catch(() => ({}));
      newSong.id = String(result.id ?? Date.now());
    } else {
      // Mode demo: hanya menambah ke state lokal.
      newSong.id = String(Date.now());
      await new Promise(r => setTimeout(r, 500));
    }

    state.songs.unshift(normalizeSong(newSong));
    // Terapkan ulang filter pencarian yang sedang aktif
    el.searchInput.dispatchEvent(new Event('input'));

    showToast(isConfigured ? 'Lagu berhasil ditambahkan!' : 'Lagu ditambahkan (mode demo, belum tersimpan permanen).');
    closeModal();
  }catch(err){
    console.error('Gagal menyimpan lagu:', err);
    showToast(`Gagal menyimpan lagu: ${err.message}`, true);
  }finally{
    el.submitSongBtn.disabled = false;
    el.submitSongBtn.textContent = 'Simpan Lagu';
  }
});

/* =====================================================================
   YOUTUBE IFRAME API — PLAYER LOGIC
   ===================================================================== */
window.onYouTubeIframeAPIReady = function(){
  state.ytReady = true;
  state.ytPlayer = new YT.Player('ytPlayerTarget', {
    height: '100%',
    width: '100%',
    playerVars: {
      autoplay: 1,
      controls: 0,
      modestbranding: 1,
      rel: 0,
      playsinline: 1
    },
    events: {
      onReady: () => {
        state.ytPlayer.setVolume(state.volume);
        if(state.pendingVideoId){
          state.ytPlayer.loadVideoById(state.pendingVideoId);
          state.pendingVideoId = null;
        }
      },
      onStateChange: onPlayerStateChange
    }
  });
};

function onPlayerStateChange(event){
  if(event.data === YT.PlayerState.PLAYING){
    state.isPlaying = true;
    updatePlayToggleUI();
    startProgressTimer();
    el.ytMiniWrap.classList.remove('hidden');
  } else if(event.data === YT.PlayerState.PAUSED){
    state.isPlaying = false;
    updatePlayToggleUI();
    stopProgressTimer();
  } else if(event.data === YT.PlayerState.ENDED){
    state.isPlaying = false;
    updatePlayToggleUI();
    stopProgressTimer();
    playNext();
  }
}

function playSongById(id){
  const index = state.songs.findIndex(s => s.id === id);
  if(index === -1) return;
  playSongAtIndex(index);
}

function playSongAtIndex(index){
  const song = state.songs[index];
  if(!song) return;

  const videoId = extractYoutubeId(song.youtube);
  if(!videoId){
    showToast('Link YouTube pada lagu ini tidak valid.', true);
    return;
  }

  state.currentIndex = index;
  updatePlayerBarUI(song);

  if(state.ytReady && state.ytPlayer && state.ytPlayer.loadVideoById){
    state.ytPlayer.loadVideoById(videoId);
    el.ytMiniWrap.classList.remove('hidden');
  } else {
    state.pendingVideoId = videoId;
  }

  renderGrid();
}

function togglePlayPause(){
  if(state.currentIndex === -1){
    if(state.songs.length > 0) playSongAtIndex(0);
    return;
  }
  if(!state.ytPlayer) return;

  if(state.isPlaying){
    state.ytPlayer.pauseVideo();
  } else {
    state.ytPlayer.playVideo();
  }
}

function playNext(){
  if(state.songs.length === 0) return;
  const next = (state.currentIndex + 1) % state.songs.length;
  playSongAtIndex(next);
}
function playPrev(){
  if(state.songs.length === 0) return;
  const prev = (state.currentIndex - 1 + state.songs.length) % state.songs.length;
  playSongAtIndex(prev);
}

function updatePlayToggleUI(){
  el.playIcon.innerHTML = state.isPlaying
    ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function updatePlayerBarUI(song){
  el.playerCover.src = song.cover || fallbackCoverDataUri();
  el.playerCover.style.display = 'block';
  el.playerTitle.textContent = song.title;
  el.playerArtist.textContent = song.artist;
  el.likeBtn.classList.toggle('liked', state.likedIds.has(song.id));
}

/* Progress bar (disinkron dari currentTime/duration YouTube player) */
function startProgressTimer(){
  stopProgressTimer();
  state.progressTimer = setInterval(() => {
    if(!state.ytPlayer || !state.ytPlayer.getCurrentTime) return;
    const current = state.ytPlayer.getCurrentTime() || 0;
    const duration = state.ytPlayer.getDuration() || 0;
    const pct = duration ? (current / duration) * 100 : 0;
    el.progressFill.style.width = pct + '%';
    el.currentTime.textContent = formatTime(current);
    el.durationTime.textContent = formatTime(duration);
  }, 500);
}
function stopProgressTimer(){
  clearInterval(state.progressTimer);
  state.progressTimer = null;
}

el.progressTrack.addEventListener('click', (e) => {
  if(!state.ytPlayer || !state.ytPlayer.getDuration) return;
  const rect = el.progressTrack.getBoundingClientRect();
  const ratio = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
  const duration = state.ytPlayer.getDuration() || 0;
  state.ytPlayer.seekTo(duration * ratio, true);
});

/* Volume (dummy slider terhubung ke YT player volume) */
function setVolumeUI(vol){
  el.volumeFill.style.width = vol + '%';
}
el.volumeTrack.addEventListener('click', (e) => {
  const rect = el.volumeTrack.getBoundingClientRect();
  const ratio = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
  state.volume = Math.round(ratio * 100);
  state.isMuted = false;
  setVolumeUI(state.volume);
  if(state.ytPlayer && state.ytPlayer.setVolume) state.ytPlayer.setVolume(state.volume);
  updateMuteIcon();
});

function updateMuteIcon(){
  el.volumeIcon.innerHTML = (state.isMuted || state.volume === 0)
    ? '<path d="M16.5 12A4.5 4.5 0 0015 8.4v2.2l1.5 1.5c0-.03 0-.07 0-.1zM19 12c0 .94-.2 1.83-.54 2.64l1.51 1.51A8.9 8.9 0 0021 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.14v2.06a8.99 8.99 0 003.69-1.86L18.73 21 20 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
    : '<path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0015 8v8a4.5 4.5 0 001.5-4z"/>';
}

const volumeIconEl = document.getElementById('volumeIcon');
el.volumeIcon = volumeIconEl;

el.muteBtn.addEventListener('click', () => {
  state.isMuted = !state.isMuted;
  if(state.ytPlayer){
    if(state.isMuted) state.ytPlayer.mute(); else state.ytPlayer.unMute();
  }
  updateMuteIcon();
});

setVolumeUI(state.volume);
updateMuteIcon();

/* Kontrol utama */
el.playToggleBtn.addEventListener('click', togglePlayPause);
el.nextBtn.addEventListener('click', playNext);
el.prevBtn.addEventListener('click', playPrev);
el.likeBtn.addEventListener('click', () => {
  if(state.currentIndex === -1) return;
  const song = state.songs[state.currentIndex];
  if(state.likedIds.has(song.id)){
    state.likedIds.delete(song.id);
  } else {
    state.likedIds.add(song.id);
  }
  el.likeBtn.classList.toggle('liked', state.likedIds.has(song.id));
});

/* Delegasi klik tombol play pada card (agar tidak double-trigger dgn klik card) */
el.songGrid.addEventListener('click', (e) => {
  const btn = e.target.closest('.card-play-btn');
  if(!btn) return;
  e.stopPropagation();
  const card = e.target.closest('.song-card');
  const id = card?.dataset.id;
  if(!id) return;

  const index = state.songs.findIndex(s => s.id === id);
  if(index === state.currentIndex){
    togglePlayPause();
  } else {
    playSongById(id);
  }
});

/* Mini video YouTube: tombol tutup hanya menyembunyikan tampilan visual
   (audio tetap berjalan di background via player instance) */
el.ytMiniClose.addEventListener('click', () => {
  el.ytMiniWrap.classList.add('hidden');
});

/* =====================================================================
   INIT
   ===================================================================== */
loadSongs();
</script>
