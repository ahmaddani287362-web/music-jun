<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 Music Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 8px;
            padding: 8px 8px 0 8px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            min-width: 200px;
            background: #121212;
            border-radius: 12px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo .icon {
            color: #1DB954;
        }
        .logo span {
            color: #fff;
        }

        .sidebar-btn {
            background: #1DB954;
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sidebar-btn:hover {
            transform: scale(1.02);
            background: #1ed760;
        }

        .sidebar-menu-item {
            padding: 10px 14px;
            border-radius: 8px;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-menu-item:hover {
            color: #fff;
            background: #282828;
        }
        .sidebar-menu-item.active {
            color: #fff;
            background: #282828;
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid #282828;
            margin: 4px 0;
        }

        /* MAIN */
        .main {
            flex: 1;
            background: #121212;
            border-radius: 12px;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-bar {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border-radius: 24px;
            border: none;
            background: #282828;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .search-bar input::placeholder {
            color: #7a7a7a;
        }
        .search-bar input:focus {
            outline: none;
            background: #333;
            box-shadow: 0 0 0 2px #1DB954;
        }
        .search-bar .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a7a7a;
            font-size: 18px;
        }

        .btn-refresh {
            background: #333;
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-refresh:hover {
            background: #444;
        }

        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grid-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .grid-header .count {
            color: #7a7a7a;
            font-size: 14px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 4px 0 20px 0;
        }

        /* MUSIC CARD */
        .music-card {
            background: #181818;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .music-card:hover {
            background: #282828;
            transform: translateY(-4px);
        }

        .music-card .card-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            object-fit: cover;
            background: #333;
            margin-bottom: 12px;
        }

        .music-card .card-title {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            margin-bottom: 4px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .music-card .card-artist {
            font-size: 13px;
            color: #b3b3b3;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .music-card .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-card:hover .delete-btn {
            opacity: 1;
        }
        .music-card .delete-btn:hover {
            background: #e91429;
            transform: scale(1.1);
        }

        /* SKELETON */
        .skeleton-card {
            background: #181818;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .skeleton-card .skeleton-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            background: #282828;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .skeleton-card .skeleton-title {
            width: 80%;
            height: 16px;
            background: #282828;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .skeleton-card .skeleton-artist {
            width: 60%;
            height: 14px;
            background: #282828;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        @keyframes skeleton-pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* PLAYER */
        .player {
            background: #181818;
            border-top: 1px solid #282828;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
            height: 72px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 180px;
        }
        .player-info .player-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: #333;
            flex-shrink: 0;
        }
        .player-info .player-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .player-info .player-meta .p-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-info .player-meta .p-artist {
            font-size: 12px;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 600px;
            gap: 4px;
        }
        .player-controls .ctrl-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .player-controls .ctrl-buttons button {
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-controls .ctrl-buttons button:hover {
            color: #fff;
        }
        .player-controls .ctrl-buttons .play-btn {
            font-size: 32px;
            color: #fff;
        }
        .player-controls .ctrl-buttons .play-btn:hover {
            transform: scale(1.05);
            color: #1DB954;
        }

        .player-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .player-progress .time {
            font-size: 11px;
            color: #b3b3b3;
            min-width: 40px;
        }
        .player-progress .progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .player-progress .progress-bar .progress-fill {
            height: 100%;
            background: #1DB954;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .player-volume {
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }
        .player-volume input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        .player-volume input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #282828;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: modalSlide 0.25s ease;
        }
        @keyframes modalSlide {
            from {
                transform: translateY(20px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .modal .sub {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #b3b3b3;
            margin-bottom: 6px;
        }
        .modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #121212;
            color: #fff;
            font-size: 14px;
            transition: border 0.2s ease;
        }
        .modal .form-group input:focus {
            outline: none;
            border-color: #1DB954;
        }
        .modal .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal .modal-actions button {
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modal .modal-actions .btn-cancel {
            background: #333;
            color: #fff;
        }
        .modal .modal-actions .btn-cancel:hover {
            background: #444;
        }
        .modal .modal-actions .btn-submit {
            background: #1DB954;
            color: #000;
        }
        .modal .modal-actions .btn-submit:hover {
            background: #1ed760;
        }
        .modal .modal-actions .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #282828;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-left: 4px solid #e91429;
        }
        .toast.success {
            border-left: 4px solid #1DB954;
        }

        #youtube-player {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .music-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .main {
                padding: 16px;
            }
            .player {
                padding: 8px 12px;
                flex-wrap: wrap;
                height: auto;
                gap: 8px;
            }
            .player-info {
                min-width: 120px;
            }
            .player-volume {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">🎵</span>
                <span>Music Tracker</span>
            </div>
            <button class="sidebar-btn" id="openAddModal">➕ Add Song</button>
            <hr class="sidebar-divider" />
            <div class="sidebar-menu-item active">🏠 Home</div>
            <div class="sidebar-menu-item">❤️ Favorites</div>
            <div class="sidebar-menu-item">📋 Playlists</div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <div class="top-bar">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Cari lagu..." />
                </div>
                <button class="btn-refresh" id="refreshBtn">🔄 Refresh</button>
            </div>
            <div class="grid-header">
                <h2>Library</h2>
                <span class="count" id="trackCount">0 lagu</span>
            </div>
            <div class="music-grid" id="musicGrid"></div>
        </main>
    </div>

    <!-- PLAYER -->
    <footer class="player" id="player">
        <div class="player-info">
            <img class="player-cover" id="playerCover" src="" alt="cover" />
            <div class="player-meta">
                <span class="p-title" id="playerTitle">Pilih lagu</span>
                <span class="p-artist" id="playerArtist">-</span>
            </div>
        </div>
        <div class="player-controls">
            <div class="ctrl-buttons">
                <button id="prevBtn" title="Mundur 5s">⏮</button>
                <button class="play-btn" id="playBtn" title="Play / Pause">▶</button>
                <button id="nextBtn" title="Maju 5s">⏭</button>
            </div>
            <div class="player-progress">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-volume">
            <span>🔊</span>
            <input type="range" min="0" max="1" step="0.01" value="0.8" id="volumeControl" />
        </div>
    </footer>

    <!-- YOUTUBE IFRAME -->
    <div id="youtube-player"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>🎵 Tambah Lagu</h2>
            <p class="sub">Tempel link YouTube, sisanya akan otomatis terisi.</p>
            <div class="form-group">
                <label>🔗 Link YouTube</label>
                <input type="url" id="inputYoutube" placeholder="https://youtube.com/watch?v=..." />
            </div>
            <div class="form-group">
                <label>🎨 Cover URL</label>
                <input type="url" id="inputCover" placeholder="Otomatis terisi..." disabled />
            </div>
            <div class="form-group">
                <label>🎤 Judul Lagu</label>
                <input type="text" id="inputTitle" placeholder="Otomatis terisi..." disabled />
            </div>
            <div class="form-group">
                <label>👤 Nama Artis</label>
                <input type="text" id="inputArtist" placeholder="Otomatis terisi..." disabled />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelModal">Batal</button>
                <button class="btn-submit" id="submitModal">Tambah</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // KONFIGURASI - GANTI CUMAN INI DOANG!
        // ============================================
        // 1. URL Apps Script (untuk ADD & DELETE)
        var API_URL = 'https://script.google.com/macros/s/AKfycbxEOSSWuBKnM86n2zfQ3-3egL-0Uxqc0QxAMF-2LGjtFTnBsGhu1n3iWgaOAfVi2XL4/exec';

        // 2. PUBLISHED SHEET ID (dari Publish to web)
        // Contoh: 2PACX-1vXXXXXX
        var PUBLISHED_SHEET_ID = '2PACX-1vQdtvNtCdrVeNZxuoRqKi3v-tl7Q92grRg5ahjAeO0A_MYvSOcj-bN2U6sTDlpUf3gPDoW0ix7fKvms'; // <-- GANTI INI!

        // 3. Nama Sheet (default: Music)
        var SHEET_NAME = 'Music';
        // ============================================

        var tracks = [];
        var currentTrack = null;
        var player = null;
        var isPlaying = false;
        var playerInterval = null;
        var searchQuery = '';
        var isLoading = false;

        // DOM REFS
        var grid = document.getElementById('musicGrid');
        var searchInput = document.getElementById('searchInput');
        var trackCount = document.getElementById('trackCount');
        var refreshBtn = document.getElementById('refreshBtn');
        var playerCover = document.getElementById('playerCover');
        var playerTitle = document.getElementById('playerTitle');
        var playerArtist = document.getElementById('playerArtist');
        var playBtn = document.getElementById('playBtn');
        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var progressFill = document.getElementById('progressFill');
        var currentTimeEl = document.getElementById('currentTime');
        var totalTimeEl = document.getElementById('totalTime');
        var progressBar = document.getElementById('progressBar');
        var volumeControl = document.getElementById('volumeControl');
        var modalOverlay = document.getElementById('modalOverlay');
        var openModalBtn = document.getElementById('openAddModal');
        var cancelModalBtn = document.getElementById('cancelModal');
        var submitModalBtn = document.getElementById('submitModal');
        var inputYoutube = document.getElementById('inputYoutube');
        var inputCover = document.getElementById('inputCover');
        var inputTitle = document.getElementById('inputTitle');
        var inputArtist = document.getElementById('inputArtist');
        var toast = document.getElementById('toast');

        var toastTimeout;

        function showToast(msg, type) {
            clearTimeout(toastTimeout);
            toast.textContent = msg;
            toast.className = 'toast show ' + (type || 'success');
            toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        // ============================================
        // 1. FETCH DATA - PAKE PUBLISHED SHEET
        // ============================================
        async function fetchTracks() {
            if (isLoading) return;
            isLoading = true;
            showSkeletons();

            try {
                // URL published sheet JSON
                var url = 'https://docs.google.com/spreadsheets/d/e/' +
                    PUBLISHED_SHEET_ID +
                    '/pub?output=csv';

                console.log('Fetching:', url);

                var res = await fetch(url);

                if (!res.ok) {
                    throw new Error('HTTP ' + res.status);
                }

                var csvText = await res.text();
                console.log('CSV length:', csvText.length);

                // Parse CSV
                var lines = csvText.split('\n').filter(function(line) { return line.trim() !== ''; });

                if (lines.length <= 1) {
                    tracks = [];
                    renderTracks();
                    showToast('Belum ada data', 'success');
                    isLoading = false;
                    return;
                }

                // Parse header
                var headers = lines[0].split(',').map(function(h) { return h.replace(/^"|"$/g, '').trim(); });

                // Parse data
                tracks = [];
                for (var i = 1; i < lines.length; i++) {
                    var values = parseCSVLine(lines[i]);
                    var item = {};
                    headers.forEach(function(h, idx) {
                        item[h] = (values[idx] || '').replace(/^"|"$/g, '').trim();
                    });
                    tracks.push(item);
                }

                console.log('Tracks loaded:', tracks.length);
                renderTracks();

                if (tracks.length === 0) {
                    showToast('Belum ada data', 'success');
                }

            } catch (err) {
                console.error('Fetch error:', err);
                showToast('Gagal ambil data: ' + err.message, 'error');
                tracks = [];
                renderTracks();
            }

            isLoading = false;
        }

        // ============================================
        // PARSE CSV LINE (handle quoted fields)
        // ============================================
        function parseCSVLine(line) {
            var result = [];
            var current = '';
            var inQuotes = false;

            for (var i = 0; i < line.length; i++) {
                var char = line[i];

                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        // ============================================
        // 2. RENDER
        // ============================================
        function renderTracks() {
            var filtered = tracks.filter(function(t) {
                return (t.Title || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (t.Artist || '').toLowerCase().includes(searchQuery.toLowerCase());
            });

            trackCount.textContent = filtered.length + ' lagu';

            if (filtered.length === 0) {
                grid.innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;color:#7a7a7a;padding:40px 0;">' +
                    '<p style="font-size:40px;">🎵</p>' +
                    '<p style="font-size:18px;margin-top:12px;">' +
                    (searchQuery ? 'Tidak ada hasil untuk "' + searchQuery + '"' : 'Belum ada lagu. Yuk tambah!') +
                    '</p>' +
                    '<p style="font-size:14px;margin-top:4px;">' +
                    (searchQuery ? 'Coba kata kunci lain' : 'Klik tombol Add Song di sidebar') +
                    '</p>' +
                    '</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var t = filtered[i];
                var coverUrl = t.CoverUrl || 'https://via.placeholder.com/180x180/333/555?text=No+Cover';
                var title = t.Title || 'Untitled';
                var artist = t.Artist || 'Unknown Artist';
                html += '<div class="music-card" data-id="' + t.ID + '" data-youtube="' + t.YoutubeUrl + '">' +
                    '<img class="card-cover" src="' + coverUrl + '" alt="' + title + '" loading="lazy" ' +
                    'onerror="this.src=\'https://via.placeholder.com/180x180/333/555?text=No+Cover\'" />' +
                    '<button class="delete-btn" data-id="' + t.ID + '" title="Hapus lagu">🗑️</button>' +
                    '<div class="card-title">' + title + '</div>' +
                    '<div class="card-artist">' + artist + '</div>' +
                    '</div>';
            }
            grid.innerHTML = html;

            // Event klik kartu
            var cards = document.querySelectorAll('.music-card');
            for (var j = 0; j < cards.length; j++) {
                var el = cards[j];
                el.addEventListener('click', function(e) {
                    if (e.target.closest('.delete-btn')) return;
                    var id = this.dataset.id;
                    var track = null;
                    for (var k = 0; k < tracks.length; k++) {
                        if (tracks[k].ID === id) {
                            track = tracks[k];
                            break;
                        }
                    }
                    if (track) playTrack(track);
                });
            }

            // Event hapus
            var deleteBtns = document.querySelectorAll('.delete-btn');
            for (var l = 0; l < deleteBtns.length; l++) {
                var btn = deleteBtns[l];
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var id = this.dataset.id;
                    deleteTrack(id);
                });
            }
        }

        function showSkeletons() {
            var html = '';
            for (var i = 0; i < 8; i++) {
                html += '<div class="skeleton-card">' +
                    '<div class="skeleton-cover"></div>' +
                    '<div class="skeleton-title"></div>' +
                    '<div class="skeleton-artist"></div>' +
                    '</div>';
            }
            grid.innerHTML = html;
        }

        // ============================================
        // 3. YOUTUBE PLAYER
        // ============================================
        function loadYouTubeAPI() {
            if (document.getElementById('youtube-api-script')) return;
            var script = document.createElement('script');
            script.id = 'youtube-api-script';
            script.src = 'https://www.youtube.com/iframe_api';
            script.async = true;
            document.head.appendChild(script);
        }

        var ytReady = false;

        function onYouTubeIframeAPIReady() {
            ytReady = true;
            console.log('YouTube API siap!');
        }
        window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

        function createPlayer(videoId) {
            if (!ytReady) {
                console.warn('YouTube API belum siap, mencoba lagi...');
                setTimeout(function() { createPlayer(videoId); }, 500);
                return;
            }
            if (player) {
                player.destroy();
                player = null;
            }
            var container = document.getElementById('youtube-player');
            player = new YT.Player(container, {
                height: 1,
                width: 1,
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onError: onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            if (volumeControl) {
                player.setVolume(volumeControl.value * 100);
            }
            if (isPlaying) {
                player.playVideo();
            } else {
                player.pauseVideo();
            }
            updateProgressLoop();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.textContent = '⏸';
                updateProgressLoop();
            } else if (event.data === YT.PlayerState.PAUSED) {
                isPlaying = false;
                playBtn.textContent = '▶';
            } else if (event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                playBtn.textContent = '▶';
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
            }
        }

        function onPlayerError(event) {
            console.error('YouTube Player Error:', event.data);
            showToast('Error memutar video. Coba lagu lain.', 'error');
            isPlaying = false;
            playBtn.textContent = '▶';
        }

        function playTrack(track) {
            if (!track || !track.YoutubeUrl) {
                showToast('Link YouTube tidak valid!', 'error');
                return;
            }
            var videoId = extractVideoId(track.YoutubeUrl);
            if (!videoId) {
                showToast('Link YouTube tidak valid!', 'error');
                return;
            }

            currentTrack = track;
            playerCover.src = track.CoverUrl || 'https://via.placeholder.com/48x48/333/555?text=No+Cover';
            playerTitle.textContent = track.Title || 'Untitled';
            playerArtist.textContent = track.Artist || 'Unknown Artist';
            isPlaying = true;
            playBtn.textContent = '⏸';

            if (player) {
                player.loadVideoById(videoId);
                player.playVideo();
            } else {
                createPlayer(videoId);
            }
        }

        // ============================================
        // 4. PLAYER CONTROLS
        // ============================================
        function togglePlay() {
            if (!player) {
                if (tracks.length > 0) {
                    playTrack(tracks[0]);
                } else {
                    showToast('Tidak ada lagu untuk diputar', 'error');
                }
                return;
            }
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function seekForward() {
            if (!player) return;
            try {
                var current = player.getCurrentTime();
                player.seekTo(Math.min(current + 5, player.getDuration()), true);
            } catch (e) {}
        }

        function seekBackward() {
            if (!player) return;
            try {
                var current = player.getCurrentTime();
                player.seekTo(Math.max(current - 5, 0), true);
            } catch (e) {}
        }

        function updateProgressLoop() {
            if (playerInterval) clearInterval(playerInterval);
            playerInterval = setInterval(function() {
                if (!player || !player.getCurrentTime) return;
                try {
                    var current = player.getCurrentTime() || 0;
                    var duration = player.getDuration() || 0;
                    var percent = duration > 0 ? (current / duration) * 100 : 0;
                    if (!isSeeking) {
                        progressFill.style.width = percent + '%';
                    }
                    currentTimeEl.textContent = formatTime(current);
                    totalTimeEl.textContent = formatTime(duration);
                } catch (e) {}
            }, 200);
        }

        var isSeeking = false;

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds) || !isFinite(seconds)) return '0:00';
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ============================================
        // 5. EXTRACT VIDEO ID
        // ============================================
        function extractVideoId(url) {
            if (!url) return null;
            var patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^&?/#]+)/,
                /youtube\.com\/watch\?.*v=([^&]+)/,
                /youtu\.be\/([^?]+)/
            ];
            for (var i = 0; i < patterns.length; i++) {
                var match = url.match(patterns[i]);
                if (match) return match[1];
            }
            var clean = url.split('?')[0].split('&')[0].split('#')[0];
            var parts = clean.split('/');
            var last = parts[parts.length - 1];
            if (last && last.length >= 11) {
                return last.substring(0, 11);
            }
            return null;
        }

        // ============================================
        // 6. MODAL - AUTOFILL & SUBMIT
        // ============================================
        var isSubmitting = false;
        var autofillTimeout;

        openModalBtn.addEventListener('click', function() {
            modalOverlay.classList.add('open');
            inputYoutube.value = '';
            inputCover.value = '';
            inputTitle.value = '';
            inputArtist.value = '';
            inputYoutube.disabled = false;
            submitModalBtn.disabled = false;
            setTimeout(function() { inputYoutube.focus(); }, 100);
        });

        cancelModalBtn.addEventListener('click', closeModal);

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });

        function closeModal() {
            modalOverlay.classList.remove('open');
            isSubmitting = false;
            submitModalBtn.disabled = false;
            submitModalBtn.textContent = 'Tambah';
        }

        inputYoutube.addEventListener('input', function() {
            clearTimeout(autofillTimeout);
            var url = this.value.trim();
            var videoId = extractVideoId(url);

            if (!videoId) {
                inputCover.value = '';
                inputTitle.value = '';
                inputArtist.value = '';
                return;
            }

            inputCover.value = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';

            autofillTimeout = setTimeout(function() {
                var fetchUrl = 'https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + videoId;
                fetch(fetchUrl)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        var title = data.title || '';
                        if (title.includes(' - ')) {
                            var parts = title.split(' - ');
                            var artistPart = parts.slice(0, -1).join(' - ').trim();
                            var titlePart = parts[parts.length - 1].trim();
                            inputArtist.value = artistPart || 'Unknown Artist';
                            inputTitle.value = titlePart || 'Untitled';
                        } else {
                            inputTitle.value = title || 'Untitled';
                            inputArtist.value = 'Unknown Artist';
                        }
                    })
                    .catch(function(err) {
                        console.warn('Gagal fetch title:', err);
                        inputTitle.value = 'Untitled';
                        inputArtist.value = 'Unknown Artist';
                    });
            }, 500);
        });

        submitModalBtn.addEventListener('click', async function() {
            if (isSubmitting) return;

            var youtubeUrl = inputYoutube.value.trim();
            var coverUrl = inputCover.value.trim();
            var title = inputTitle.value.trim() || 'Untitled';
            var artist = inputArtist.value.trim() || 'Unknown Artist';

            if (!youtubeUrl) {
                showToast('Masukkan link YouTube terlebih dahulu!', 'error');
                return;
            }

            var videoId = extractVideoId(youtubeUrl);
            if (!videoId) {
                showToast('Link YouTube tidak valid!', 'error');
                return;
            }

            // Cek duplikasi
            var exists = false;
            for (var m = 0; m < tracks.length; m++) {
                var existingId = extractVideoId(tracks[m].YoutubeUrl);
                if (existingId === videoId) {
                    exists = true;
                    break;
                }
            }
            if (exists) {
                showToast('⚠️ Lagu ini sudah ada di library lo!', 'error');
                return;
            }

            isSubmitting = true;
            submitModalBtn.disabled = true;
            submitModalBtn.textContent = 'Menyimpan...';

            try {
                var payload = {
                    action: 'add',
                    data: {
                        title: title,
                        artist: artist,
                        coverUrl: coverUrl,
                        youtubeUrl: youtubeUrl
                    }
                };

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                showToast('✅ Lagu berhasil ditambahkan!', 'success');
                closeModal();

                setTimeout(function() {
                    fetchTracks();
                }, 2000);

            } catch (err) {
                console.error('Submit error:', err);
                showToast('❌ Gagal menambahkan lagu. Coba lagi.', 'error');
            } finally {
                isSubmitting = false;
                submitModalBtn.disabled = false;
                submitModalBtn.textContent = 'Tambah';
            }
        });

        // ============================================
        // 7. DELETE TRACK
        // ============================================
        async function deleteTrack(id) {
            if (!confirm('Yakin ingin menghapus lagu ini?')) return;

            try {
                var payload = {
                    action: 'delete',
                    id: id
                };

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                showToast('🗑️ Lagu berhasil dihapus', 'success');

                var newTracks = [];
                for (var n = 0; n < tracks.length; n++) {
                    if (tracks[n].ID !== id) {
                        newTracks.push(tracks[n]);
                    }
                }
                tracks = newTracks;
                renderTracks();

                if (currentTrack && currentTrack.ID === id) {
                    currentTrack = null;
                    playerCover.src = '';
                    playerTitle.textContent = 'Pilih lagu';
                    playerArtist.textContent = '-';
                    if (player) {
                        player.pauseVideo();
                        isPlaying = false;
                        playBtn.textContent = '▶';
                    }
                }

                setTimeout(function() {
                    fetchTracks();
                }, 2000);

            } catch (err) {
                console.error('Delete error:', err);
                showToast('❌ Gagal menghapus lagu. Coba lagi.', 'error');
            }
        }

        // ============================================
        // 8. KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', function(e) {
            var tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

            switch (e.key) {
                case ' ':
                case 'Spacebar':
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    seekForward();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    seekBackward();
                    break;
            }
        });

        // ============================================
        // 9. EVENT LISTENERS
        // ============================================
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', seekBackward);
        nextBtn.addEventListener('click', seekForward);

        refreshBtn.addEventListener('click', function() {
            fetchTracks();
        });

        volumeControl.addEventListener('input', function() {
            if (player) {
                player.setVolume(volumeControl.value * 100);
            }
        });

        progressBar.addEventListener('click', function(e) {
            if (!player) return;
            var rect = progressBar.getBoundingClientRect();
            var x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            var duration = player.getDuration();
            if (duration > 0) {
                isSeeking = true;
                player.seekTo(x * duration, true);
                setTimeout(function() { isSeeking = false; }, 300);
            }
        });

        searchInput.addEventListener('input', function() {
            searchQuery = searchInput.value.trim();
            renderTracks();
        });

        // ============================================
        // 10. INIT
        // ============================================
        console.log('🎵 Music Tracker starting...');
        console.log('API URL:', API_URL);
        console.log('Published Sheet ID:', PUBLISHED_SHEET_ID);

        loadYouTubeAPI();

        setTimeout(function() {
            fetchTracks();
        }, 500);

        setInterval(function() {
            if (!isLoading) {
                fetchTracks();
            }
        }, 30000);

        console.log('🎵 Music Tracker siap!');
    </script>
</body>
</html>
